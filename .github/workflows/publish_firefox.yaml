name: Publish to Firefox addon marketplace
on:
  workflow_dispatch:
  # pull_request:
  #   types: [closed]
  #   branches: [main, master]
    
  

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
      - name: code checkout
        uses: actions/checkout@v4
      - name: Bundle
        run: npm install && npm run dev
      - name: Zip the thing
        run: 7z a extension.zip dist/manifest.json dist/index.html dist/scripts/main.js dist/libs/*


